name: Build and Release MimiClaw C3

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container: espressif/idf:v5.5.2
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Prepare Secrets
        run: |
          cp main/mimi_secrets.h.example main/mimi_secrets.h

      - name: Build with ESP-IDF
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          # Set target and build
          idf.py set-target esp32c3
          idf.py build
          
          # Use esptool.py to merge everything into one bin based on flash_args
          # This ensures correct offsets for bootloader, partition table, otadata, and app.
          cd build
          esptool.py --chip esp32c3 merge_bin \
            -o mimiclaw_merged_c3.bin \
            --fill-flash-size 4MB \
            @flash_args

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimiclaw-c3-bin
          path: build/mimiclaw_merged_c3.bin

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/mimiclaw_merged_c3.bin
          body: |
            MimiClaw ESP32-C3 Automated Build.
            
            Flash using:
            ```
            esptool.py -p PORT write_flash 0x0 mimiclaw_merged_c3.bin
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
